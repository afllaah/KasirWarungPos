<!DOCTYPE html>
<html>

<head>
    <title>Lupa Password - WarungPOS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="auth-page">

    <div class="auth-card">
        <img src="{{ url_for('static', filename='logo.png') }}" class="auth-logo" alt="Logo WarungPOS">

        <h1 class="auth-title">WARUNG POS</h1>
        <p class="auth-subtitle">Reset Password Akun Anda</p>

        {% if error %}
        <div class="auth-error">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="auth-success">
            {{ success }}
        </div>
        <div class="auth-links" style="margin-top: 25px;">
            <a href="/" class="auth-btn"
                style="text-decoration: none; display: block; text-align: center; color: white;">KEMBALI KE LOGIN</a>
        </div>
        {% else %}
        <form method="POST">
            <div class="auth-input-group">
                <input type="text" name="username" placeholder="Masukkan Username" required>
                <input type="password" name="new_password" placeholder="Masukkan Password Baru" required>
                <input type="password" name="confirm_password" placeholder="Konfirmasi Password Baru" required>
            </div>
            <button type="submit" class="auth-btn">RESET PASSWORD</button>
        </form>

        <div class="auth-links">
            <a href="/" class="auth-link">Kembali ke Login</a>
        </div>
        {% endif %}

        <p class="auth-footer">&copy; 2026 WarungPOS</p>
    </div>

</body>

</html>
